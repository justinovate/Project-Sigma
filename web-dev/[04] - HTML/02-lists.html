<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Lists</title>
  </head>
  <body>
    <h1>Unordered List, Ordered List, and Description List</h1>

    <h2>Unordered List</h2>
    <ul>
      <li>Apple</li>
      <li>Mango</li>
      <li>Banana</li>
    </ul>
    <hr />
    <h2>Ordered List</h2>
    <ol type="1" start="5">
      <!-- 1 - numberical order -->
      <!-- A - uppercase alphabetical order -->
      <!-- a - lowercase alphabetical order -->
      <!-- I - uppercase roman numerals  -->
      <!-- i - lowercase roman numerals  -->
      <li>Red</li>
      <li>Orange</li>
      <li>Yellow</li>
      <li>Green</li>
      <li>Blue</li>
      <li>Indigo</li>
      <li>Violet</li>
    </ol>
    <hr />
    <h2>Description List</h2>
    <!-- dl - descripttion list -->
    <!-- dt - description term -->
    <!-- dd - description definition -->
    <dl>
      <dt>HTML</dt>
      <dd>Hypertext Markup Language</dd>
      <dt>CSS</dt>
      <dd>Cascading Style Sheets</dd>
      <dt>JS</dt>
      <dd>JavaScript</dd>
    </dl>

    <ul type="none">
      <li><a href="./01-typography.html">Typography</a></li>
    </ul>
  </body>
</html>
